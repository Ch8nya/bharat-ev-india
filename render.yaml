services:
  - type: web
    name: bharat-ev
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:push && node --env-file=.env simple-import.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: bharat-ev-db
          property: connectionString
      - key: PGHOST
        fromDatabase:
          name: bharat-ev-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: bharat-ev-db
          property: port
      - key: PGUSER
        fromDatabase:
          name: bharat-ev-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: bharat-ev-db
          property: password
      - key: PGDATABASE
        fromDatabase:
          name: bharat-ev-db
          property: database
      - key: PGSSL
        value: "true"

databases:
  - name: bharat-ev-db
    plan: free
    databaseName: bharat_ev
